<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animales</title>
</head>
<body>

<h1>Listado de animales</h1>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
        </tr>
    </thead>
    <tbody>
        {% for animal in animales %}
        <tr>
            <td>{{ animal.id }}</td>
            <td>{{ animal.nombre }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
